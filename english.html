<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>译林英语 1-6年级 · 综合练习</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap');
:root{
  --bg:#f0f4ff;--card:#fff;--pri:#4f6ef7;--pri-l:#e8edff;
  --ok:#22c55e;--ok-l:#dcfce7;--err:#ef4444;--err-l:#fee2e2;
  --txt:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --shadow:0 2px 16px rgba(79,110,247,.09);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{max-width:760px;margin:0 auto;padding:20px 14px 60px}
header{text-align:center;margin-bottom:18px}
.logo{display:inline-flex;align-items:center;gap:8px;background:var(--pri);color:#fff;padding:6px 18px;border-radius:50px;font-size:13px;font-weight:700;margin-bottom:8px}
h1{font-size:22px;font-weight:800;line-height:1.25}
h1 span{color:var(--pri)}
.sub{font-size:12px;color:var(--muted);margin-top:4px}
.big-tabs{display:flex;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border);background:var(--card)}
.big-tab{flex:1;padding:11px 0;border:none;background:none;font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.big-tab.active{background:var(--pri);color:#fff}
.sub-tabs{display:flex;margin-bottom:12px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);background:var(--card)}
.sub-tab{flex:1;padding:9px 0;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;border-right:1px solid var(--border)}
.sub-tab:last-child{border-right:none}
.sub-tab.active{background:var(--pri);color:#fff}
/* grade + unit selector */
.grade-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;justify-content:center}
.grade-btn{padding:5px 13px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit}
.grade-btn:hover,.grade-btn.active{border-color:var(--pri);color:var(--pri)}
.grade-btn.active{background:var(--pri);color:#fff}
.unit-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;justify-content:center;min-height:30px}
.unit-btn{padding:4px 11px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit}
.unit-btn:hover,.unit-btn.active{border-color:var(--pri);color:var(--pri)}
.unit-btn.active{background:var(--pri);color:#fff}
/* progress */
.prog-wrap{background:var(--border);border-radius:99px;height:7px;margin-bottom:6px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#4f6ef7,#818cf8);border-radius:99px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:12px}
.badges{display:flex;gap:10px}
.badge{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700}
.dot{width:7px;height:7px;border-radius:50%}
/* card */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px 22px 18px;margin-bottom:12px;border:1.5px solid transparent;transition:border-color .3s,box-shadow .3s}
.card.ok{border-color:var(--ok);box-shadow:0 2px 20px rgba(34,197,94,.15)}
.card.err{border-color:var(--err);box-shadow:0 2px 20px rgba(239,68,68,.15)}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.qnum{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px}
.ubadge{background:var(--pri-l);color:var(--pri);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.tbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.bw{background:#fef3c7;color:#92400e}.bp{background:#ede9fe;color:#5b21b6}.bs{background:#e0f2fe;color:#075985}
.prompt{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:4px;line-height:1.5;font-family:'Noto Sans SC',sans-serif}
.prompt-note{font-size:12px;color:var(--muted);margin-bottom:11px}
.inp-row{display:flex;gap:8px;align-items:center}
.ans{flex:1;height:44px;border:2px solid var(--border);border-radius:10px;padding:0 13px;font-size:15px;font-family:'Nunito',sans-serif;color:var(--txt);background:var(--bg);outline:none;transition:border-color .2s,background .2s}
.ans:focus{border-color:var(--pri);background:#fff}
.ans.ok{border-color:var(--ok);background:var(--ok-l);color:#166534}
.ans.err{border-color:var(--err);background:var(--err-l);color:#991b1b}
.ans:disabled{opacity:.85;cursor:default}
.chk{height:44px;padding:0 18px;background:var(--pri);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;white-space:nowrap}
.chk:hover{background:#3b58e0}.chk:active{transform:scale(.97)}
.chk:disabled{background:var(--border);color:var(--muted);cursor:default}
.result{margin-top:11px;min-height:24px}
.rrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rico.ok{background:var(--ok);color:#fff}.rico.err{background:var(--err);color:#fff}
.rtxt{font-size:13px;font-weight:600}
.rtxt.ok{color:#166534}.rtxt.err{color:#991b1b}
.hint-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:10px;border:1px solid var(--border)}
.hlabel{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.htext{font-size:13px;font-weight:700;color:var(--txt)}
.spk{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;border:1.5px solid var(--pri);background:none;color:var(--pri);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.spk:hover{background:var(--pri-l)}.spk.g{border-color:#cbd5e1;color:#94a3b8}.spk.g:hover{background:#f1f5f9}.spk.playing{background:var(--pri);color:#fff}
.cpybtn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;border:1.5px solid #0ea5e9;background:none;color:#0ea5e9;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.cpybtn:hover{background:#e0f2fe}
.showbtn{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:7px;border:1.5px solid var(--err);background:none;color:var(--err);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.showbtn:hover{background:var(--err-l)}
.nav-row{display:flex;justify-content:center;gap:10px;margin-top:6px}
.nbtn{height:40px;padding:0 22px;border:1.5px solid var(--border);background:var(--card);border-radius:10px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s}
.nbtn:hover{border-color:var(--pri);color:var(--pri)}
.nbtn.p{background:var(--pri);color:#fff;border-color:var(--pri)}.nbtn.p:hover{background:#3b58e0}
/* flip card */
.flip-hint{text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px}
.wcard-wrap{perspective:900px;margin-bottom:10px;cursor:pointer;user-select:none}
.wcard{width:100%;height:180px;position:relative;transform-style:preserve-3d;transition:transform .5s}
.wcard.flipped{transform:rotateY(180deg)}
.wface{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wfront{background:var(--card);border:1.5px solid var(--border)}
.wback{background:linear-gradient(135deg,#4f6ef7,#818cf8);transform:rotateY(180deg)}
.wtip{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.wzh{font-size:24px;font-weight:800;font-family:'Noto Sans SC',sans-serif;color:var(--txt);margin-bottom:6px}
.wen{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px;text-align:center}
.wtype{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:10px}
.wback .spk{border-color:rgba(255,255,255,.75);color:#fff;background:rgba(255,255,255,.15)}
.wback .spk:hover{background:rgba(255,255,255,.3)}
.wcard-nav{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:5px}
.wcnt{font-size:12px;color:var(--muted);font-weight:700;min-width:54px;text-align:center}
/* finish */
.finish{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 26px;text-align:center}
.f-emoji{font-size:48px;margin-bottom:10px}
.f-title{font-size:20px;font-weight:800;margin-bottom:4px}
.f-score{font-size:48px;font-weight:800;color:var(--pri);margin:10px 0 4px}
.f-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.stat-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.stat{background:var(--bg);border-radius:12px;padding:8px 18px;text-align:center}
.sn{font-size:20px;font-weight:800}.sn.g{color:var(--ok)}.sn.r{color:var(--err)}
.sl{font-size:11px;color:var(--muted);margin-top:2px}
.rbtn{height:42px;padding:0 30px;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.rbtn:hover{background:#3b58e0}
/* ── dict lookup panel ── */
.dict-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;border:1.5px solid #8b5cf6;background:none;color:#8b5cf6;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.dict-btn:hover{background:#f5f3ff}
.dict-btn.loading{opacity:.6;cursor:default}
.dict-panel{margin-top:10px;background:#faf5ff;border:1.5px solid #ddd6fe;border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.7}
.dict-panel .dp-source{font-size:11px;font-weight:700;color:#8b5cf6;margin-bottom:8px;letter-spacing:.5px}
.dict-panel .dp-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:5px}
.dict-panel .dp-tag{flex-shrink:0;background:#ede9fe;color:#6d28d9;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-top:3px}
.dict-panel .dp-text{color:var(--txt)}
.dict-panel .dp-divider{border:none;border-top:1px solid #ddd6fe;margin:8px 0}
.dict-panel .dp-extra{font-size:12px;color:var(--muted)}
.dict-panel .dp-err{color:#ef4444;font-size:12px}

/* ── custom translator ── */
.trans-section{margin-top:32px;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:24px 22px 20px;border:1.5px solid var(--border)}
.trans-title{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.trans-subtitle{font-size:12px;color:var(--muted);margin-bottom:16px}
.trans-inp-row{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
.trans-inp{flex:1;min-height:44px;border:2px solid var(--border);border-radius:10px;padding:10px 13px;font-size:15px;font-family:'Nunito',sans-serif;color:var(--txt);background:var(--bg);outline:none;resize:vertical;transition:border-color .2s,background .2s;line-height:1.5}
.trans-inp:focus{border-color:var(--pri);background:#fff}
.trans-btns{display:flex;flex-direction:column;gap:6px}
.trans-go{height:44px;padding:0 18px;background:var(--pri);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;white-space:nowrap}
.trans-go:hover{background:#3b58e0}.trans-go:active{transform:scale(.97)}
.trans-go:disabled{background:var(--border);color:var(--muted);cursor:default}
.trans-clear{height:36px;padding:0 12px;background:none;color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.trans-clear:hover{border-color:var(--err);color:var(--err)}
.trans-dir-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tdir{padding:4px 12px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit}
.tdir.active{background:var(--pri);border-color:var(--pri);color:#fff}
.trans-result{background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;min-height:48px}
.trans-result.has-result{border-color:#ddd6fe;background:#faf5ff}
.tr-loading{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
.tr-main{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:10px;line-height:1.5}
.tr-source{font-size:10px;font-weight:700;color:#8b5cf6;letter-spacing:.5px;margin-bottom:8px}
.tr-alts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tr-alt{padding:3px 10px;border-radius:6px;background:#ede9fe;color:#5b21b6;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s}
.tr-alt:hover{background:#ddd6fe}
.tr-divider{border:none;border-top:1px solid #ddd6fe;margin:8px 0}
.tr-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px}
.tr-tag{flex-shrink:0;background:#ede9fe;color:#6d28d9;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-top:3px}
.tr-txt{color:var(--txt);font-size:13px;line-height:1.6}
.tr-example{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.6}
.tr-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tr-err{color:#ef4444;font-size:13px}
.tr-empty{color:var(--muted);font-size:13px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.hist-section{margin-top:14px}
.hist-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:7px}
.hist-list{display:flex;gap:6px;flex-wrap:wrap}
.hist-chip{padding:3px 10px;border-radius:50px;background:var(--pri-l);color:var(--pri);font-size:12px;font-weight:700;cursor:pointer;transition:background .2s}
.hist-chip:hover{background:#ddd6fe}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">⭐ 译林英语 · 1–6年级</div>
    <h1>英语<span>综合练习</span>工具</h1>
    <p class="sub">翻卡记忆 &nbsp;·&nbsp; 单词 / 词组 / 句子 输入练习 &nbsp;·&nbsp; 语音朗读</p>
  </header>

  <div class="big-tabs">
    <button class="big-tab active" id="bigFlip" onclick="setBig('flip')">🃏 翻卡记忆</button>
    <button class="big-tab" id="bigPrac" onclick="setBig('prac')">✍️ 输入练习</button>
  </div>
  <div id="subTabsWrap" style="display:none">
    <div class="sub-tabs">
      <button class="sub-tab active" id="subWord"   onclick="setSub('word')">📝 单词</button>
      <button class="sub-tab"        id="subPhrase" onclick="setSub('phrase')">🔗 词组</button>
      <button class="sub-tab"        id="subSent"   onclick="setSub('sent')">💬 句子</button>
    </div>
  </div>

  <div class="grade-row" id="gradeRow"></div>
  <div class="unit-row"  id="unitRow"></div>

  <div id="progSection" style="display:none">
    <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
    <div class="prog-info">
      <span id="progTxt"></span>
      <div class="badges">
        <div class="badge"><div class="dot" style="background:var(--ok)"></div><span id="cntOk">正确 0</span></div>
        <div class="badge"><div class="dot" style="background:var(--err)"></div><span id="cntErr">错误 0</span></div>
      </div>
    </div>
  </div>

  <div id="mainArea"></div>
  <div class="nav-row" id="navRow" style="display:none"></div>
  <div id="finishArea" style="display:none"></div>

  <!-- ══════════ 自定义翻译查询 ══════════ -->
  <div class="trans-section" id="transSection">
    <div class="trans-title">🔍 自定义翻译查询</div>
    <div class="trans-subtitle">输入任意英文或中文，获取翻译与多种释义（双引擎：MyMemory + AI 同时查询）</div>

    <div class="trans-dir-row" id="transDirRow">
      <button class="tdir active" onclick="setDir('en|zh',this)">英文 → 中文</button>
      <button class="tdir" onclick="setDir('zh|en',this)">中文 → 英文</button>
      <button class="tdir" onclick="setDir('auto',this)">自动识别</button>
    </div>

    <div class="trans-inp-row">
      <textarea class="trans-inp" id="transInp" rows="2"
        placeholder="输入英文单词、词组或句子…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doTranslate()}"></textarea>
      <div class="trans-btns">
        <button class="trans-go" id="transGoBtn" onclick="doTranslate()">翻 译</button>
        <button class="trans-clear" onclick="clearTrans()">清 空</button>
      </div>
    </div>

    <div class="trans-result" id="transResult">
      <span class="tr-empty">翻译结果将显示在这里</span>
    </div>

    <div class="hist-section" id="histSection" style="display:none">
      <div class="hist-label">最近查询</div>
      <div class="hist-list" id="histList"></div>
    </div>
  </div>

</div>

<script>
/* =====================================================================
   DATA  —  译林版 1-6年级 全册
   结构: GRADES[年级][册][Unit名] = { label, words[], phrases[], sentences[] }
   ===================================================================== */
const GRADES = {

/* ─────────────────── 一年级上 ─────────────────── */
"1A":{
  "Unit 1":{label:"1A U1 Hello",
    words:[
      {zh:"你好（非正式）",en:"hi",type:"int."},
      {zh:"你好（正式）",en:"hello",type:"int."},
      {zh:"我是",en:"I'm",type:"phrase"},
    ],
    phrases:[
      {zh:"你好！我是……",en:"Hi! I'm ..."},
      {zh:"你好！我是……",en:"Hello! I'm ..."},
    ],
    sentences:[
      {zh:"你好！我是迈克。",en:"Hi! I'm Mike."},
      {zh:"你好！我是南希。",en:"Hello! I'm Nancy."},
    ]
  },
  "Unit 2":{label:"1A U2 Good morning",
    words:[
      {zh:"早上好",en:"Good morning",type:"phrase"},
      {zh:"下午好",en:"Good afternoon",type:"phrase"},
      {zh:"晚上好",en:"Good evening",type:"phrase"},
    ],
    phrases:[
      {zh:"早上好，老师！",en:"Good morning, Miss Li!"},
      {zh:"下午好！",en:"Good afternoon!"},
    ],
    sentences:[
      {zh:"早上好，刘老师！",en:"Good morning, Miss Liu!"},
      {zh:"下午好，同学们！",en:"Good afternoon, boys and girls!"},
      {zh:"晚上好！",en:"Good evening!"},
    ]
  },
  "Unit 3":{label:"1A U3 My family",
    words:[
      {zh:"妈妈",en:"mum",type:"n."},
      {zh:"爸爸",en:"dad",type:"n."},
      {zh:"爷爷/外公",en:"grandpa",type:"n."},
      {zh:"奶奶/外婆",en:"grandma",type:"n."},
      {zh:"我的",en:"my",type:"pron."},
    ],
    phrases:[
      {zh:"我的妈妈",en:"my mum"},
      {zh:"我的爸爸",en:"my dad"},
      {zh:"我的家人",en:"my family"},
    ],
    sentences:[
      {zh:"这是我的妈妈。",en:"This is my mum."},
      {zh:"这是我的爸爸。",en:"This is my dad."},
      {zh:"这是我的家人。",en:"This is my family."},
    ]
  },
  "Unit 4":{label:"1A U4 My friends",
    words:[
      {zh:"朋友",en:"friend",type:"n."},
      {zh:"他",en:"he",type:"pron."},
      {zh:"她",en:"she",type:"pron."},
      {zh:"男孩",en:"boy",type:"n."},
      {zh:"女孩",en:"girl",type:"n."},
    ],
    phrases:[

/* =====================================================================
   SPEECH
   ===================================================================== */
document.addEventListener('click', e => {
  const b = e.target.closest('[data-speak]');
  if (b) doSpeak(b.dataset.speak, b, b.dataset.lang||null);
  const cb = e.target.closest('[data-copy]');
  if (cb) doCopy(cb.dataset.copy, cb);
});
function doCopy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    btn.style.borderColor = 'var(--ok)';
    btn.style.color = 'var(--ok)';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor=''; btn.style.color=''; }, 1500);
  }).catch(() => {});
}
function doSpeak(text, btn, lang) {
  if (!window.speechSynthesis){ alert('浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  document.querySelectorAll('.spk.playing').forEach(b=>b.classList.remove('playing'));
  const u = new SpeechSynthesisUtterance(text);
  // auto-detect Chinese if no lang given
  const isZh = /[\u4e00-\u9fff]/.test(text);
  u.lang = lang || (isZh ? 'zh-CN' : 'en-US');
  u.rate = isZh ? 0.9 : 0.82;
  u.pitch = 1;
  if (btn) btn.classList.add('playing');
  u.onend = u.onerror = ()=>{ if(btn) btn.classList.remove('playing'); };
  window.speechSynthesis.speak(u);
}

/* =====================================================================
   UTILS
   ===================================================================== */
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function norm(s){ return s.trim().toLowerCase().replace(/[\u2018\u2019]/g,"'").replace(/[\u201c\u201d]/g,'"').replace(/\s+/g,' '); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
const SPKICO=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
function spkBtn(text,cls){ return `<button class="spk${cls?' '+cls:''}" data-speak="${esc(text)}">${SPKICO}朗读</button>`; }
function copyBtn(text){ return `<button class="cpybtn" data-copy="${esc(text)}" title="复制原文">📋 复制</button>`; }

   DATA HELPERS
   ===================================================================== */
const GRADE_LABELS = {
  '1A':'一年级上','1B':'一年级下',
  '2A':'二年级上','2B':'二年级下',
  '3A':'三年级上','3B':'三年级下',
  '4A':'四年级上','4B':'四年级下',
  '5A':'五年级上','5B':'五年级下',
  '6A':'六年级上','6B':'六年级下',
};

function getUnitsForGrade(g){
  if(g==='all') return null;
  return GRADES[g]||{};
}

function getItems(type){
  let arr=[];
  const grades = curGrade==='all' ? Object.keys(GRADES) : [curGrade];
  for(const g of grades){
    const units = GRADES[g];
    const unitKeys = curUnit==='all' ? Object.keys(units) : [curUnit];
    for(const uk of unitKeys){
      if(!units[uk]) continue;
      const u=units[uk];
      const src=type==='word'?u.words:type==='phrase'?u.phrases:u.sentences;
      src.forEach(x=>arr.push({...x,sub:type,grade:g,unit:uk,ul:u.label}));
    }
  }
  return shuffle(arr);
}

/* =====================================================================
   RENDER TABS
   ===================================================================== */
function setBig(m){
  bigMode=m;
  document.getElementById('bigFlip').classList.toggle('active',m==='flip');
  document.getElementById('bigPrac').classList.toggle('active',m==='prac');
  document.getElementById('subTabsWrap').style.display=m==='prac'?'':'none';
  curGrade='all'; curUnit='all';
  renderGradeTabs(); renderUnitTabs(); init();
}
function setSub(m){
  subMode=m;
  ['word','phrase','sent'].forEach(s=>{
    const id='sub'+s.charAt(0).toUpperCase()+s.slice(1);
    document.getElementById(id).classList.toggle('active',s===m);
  });
  curGrade='all'; curUnit='all';
  renderGradeTabs(); renderUnitTabs(); init();
}
function switchGrade(g){
  curGrade=g; curUnit='all';
  renderGradeTabs(); renderUnitTabs(); init();
}
function switchUnit(u){
  curUnit=u;
  renderUnitTabs(); init();
}

function renderGradeTabs(){
  const el=document.getElementById('gradeRow');
  const grades=['all','1A','1B','2A','2B','3A','3B','4A','4B','5A','5B','6A','6B'];
  el.innerHTML=grades.map(g=>{
    const label=g==='all'?'全部年级':GRADE_LABELS[g];
    return `<button class="grade-btn${curGrade===g?' active':''}" onclick="switchGrade('${g}')">${label}</button>`;
  }).join('');
}

function renderUnitTabs(){
  const el=document.getElementById('unitRow');
  if(curGrade==='all'){ el.innerHTML=''; return; }
  const units=GRADES[curGrade]||{};
  const keys=Object.keys(units);
  el.innerHTML=`<button class="unit-btn${curUnit==='all'?' active':''}" onclick="switchUnit('all')">全部单元</button>`
    +keys.map(uk=>`<button class="unit-btn${curUnit===uk?' active':''}" onclick="switchUnit('${uk}')">${units[uk].label}</button>`).join('');
}

/* =====================================================================
   INIT
   ===================================================================== */
function init(){
  document.getElementById('finishArea').style.display='none';
  document.getElementById('navRow').style.display='none';
  isDone=false;
  if(bigMode==='flip'){
    flipItems=getItems('word').concat(getItems('phrase')); // mix words+phrases for flip
    flipItems=shuffle(flipItems);
    flipIdx=0; flipped=false;
    document.getElementById('progSection').style.display='none';
    document.getElementById('mainArea').style.display='';
    renderFlip();
  } else {
    questions=getItems(subMode);
    answers=new Array(questions.length).fill(null);
    qIdx=0; okN=0; errN=0;
    document.getElementById('progSection').style.display='';
    document.getElementById('mainArea').style.display='';
    renderProg(); renderPrac(); renderNav();
  }
}

  if(!flipItems.length){ area.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">暂无内容</p>'; return; }

  const subBadge=it.sub==='word'?'<span class="tbadge bw">单词</span>':'<span class="tbadge bp">词组</span>';
  area.innerHTML=`
    <div class="flip-hint">👆 点击卡片翻转查看英文 &nbsp;·&nbsp; ${flipIdx+1} / ${flipItems.length}</div>
    <div class="wcard-wrap" onclick="doFlip()">
      <div class="wcard${flipped?' flipped':''}" id="wcard">
        <div class="wface wfront">
          <div class="wtip">中文 — 点击翻转</div>
          <div class="wzh">${esc(it.zh)}</div>
          <div style="display:flex;gap:5px;margin-top:7px;align-items:center"><span class="ubadge">${esc(it.ul)}</span>${subBadge}&nbsp;${copyBtn(it.zh)}</div>
        </div>
        <div class="wface wback">
          <div class="wtip" style="color:rgba(255,255,255,.7)">英文答案</div>
          <div class="wen">${esc(it.en)}</div>
          ${it.type?`<div class="wtype">${esc(it.type)}</div>`:''}
          ${spkBtn(it.en)}&nbsp;${dictBtn(it.en)}
        </div>
        <div id="dictPanel"></div>
      </div>
    </div>
    <div class="wcard-nav">
      ${flipIdx>0?`<button class="nbtn" onclick="event.stopPropagation();flipGo(${flipIdx-1})">← 上一个</button>`:'<span style="width:76px"></span>'}
      <span class="wcnt">${flipIdx+1} / ${flipItems.length}</span>
      ${flipIdx<flipItems.length-1
        ?`<button class="nbtn p" onclick="event.stopPropagation();flipGo(${flipIdx+1})">下一个 →</button>`
        :`<button class="nbtn p" onclick="event.stopPropagation();reshuffleFlip()">🔀 重新洗牌</button>`}
    </div>`;
}
function doFlip(){ flipped=!flipped; const c=document.getElementById('wcard'); if(c)c.classList.toggle('flipped',flipped); }
function flipGo(i){ flipIdx=i; flipped=false; renderFlip(); }
function reshuffleFlip(){ flipItems=shuffle(flipItems); flipIdx=0; flipped=false; renderFlip(); }

/* =====================================================================
   PRACTICE
   ===================================================================== */
const TYPE_META={
  word:  {badge:'<span class="tbadge bw">单词</span>',  note:'看中文，输入对应英文单词'},
  phrase:{badge:'<span class="tbadge bp">词组</span>',  note:'看中文，输入对应英文词组'},
  sent:  {badge:'<span class="tbadge bs">句子</span>',  note:'看中文，输入对应英文句子'},
};

function renderProg(){
  const total=questions.length, dn=answers.filter(a=>a!==null).length;
  document.getElementById('progBar').style.width=(total?dn/total*100:0)+'%';
  document.getElementById('progTxt').textContent=`第 ${qIdx+1} 题 / 共 ${total} 题`;
  document.getElementById('cntOk').textContent=`正确 ${okN}`;
  document.getElementById('cntErr').textContent=`错误 ${errN}`;
}

function renderPrac(){
  const area=document.getElementById('mainArea');
  if(isDone){area.style.display='none';return;}
  area.style.display='';
  if(!questions.length){ area.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">暂无内容，请选择年级或单元</p>'; return; }
  const q=questions[qIdx], ans=answers[qIdx];
  const isAns=ans!==null, isOk=!!(ans&&ans.correct), locked=isOk;
  const {badge,note}=TYPE_META[q.sub]||TYPE_META.sent;
  area.innerHTML=`
    <div class="card${isOk?' ok':isAns?' err':''}">
      <div class="card-meta">
        <span class="qnum">第 ${qIdx+1} 题</span>
        <span class="ubadge">${esc(q.ul)}</span>
        ${badge}
      </div>
      <div class="prompt" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${esc(q.zh)}&nbsp;${copyBtn(q.zh)}</div>
      <div class="prompt-note">${note}</div>
      <div class="inp-row">
        <input id="ansInp" class="ans${isOk?' ok':isAns?' err':''}"
          type="text" placeholder="输入英文…"
          value="${isAns?esc(ans.input):''}"
          ${locked?'disabled':''}
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
        <button class="chk" onclick="checkAns()" ${locked?'disabled':''}>确认</button>
      </div>
      <div class="result" id="resultArea">${isAns?buildResult(isOk,q.en):''}</div>
    </div>`;
  if(!locked){
    const inp=document.getElementById('ansInp');
    if(inp){ inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkAns();}); setTimeout(()=>{inp.focus();if(isAns)inp.select();},50); }
  }
}

function buildResult(isOk, en){
  if(isOk) return `<div class="rrow"><div class="rico ok">✓</div><span class="rtxt ok">回答正确！太棒了！</span>${spkBtn(en)}&nbsp;${dictBtn(en)}</div><div id="dictPanel"></div>`;
  return `<div>
    <div class="rrow"><div class="rico err">✗</div><span class="rtxt err">回答错误，请重新输入！</span></div>
    <div class="hint-row">
      <span class="hlabel">参考答案：</span>
      <span class="htext" id="hSpan" style="display:none">${esc(en)}</span>
      <button class="showbtn" id="showBtn" onclick="toggleHint()">👁 显示答案</button>
      ${spkBtn(en,'g')}&nbsp;${dictBtn(en)}
    </div>
    <div id="dictPanel"></div>
  </div>`;
}

function toggleHint(){
  const sp=document.getElementById('hSpan'), bt=document.getElementById('showBtn');
  if(!sp||!bt) return;
  const shown=sp.style.display!=='none';
  sp.style.display=shown?'none':''; bt.textContent=shown?'👁 显示答案':'🙈 隐藏答案';
}

function checkAns(){
  const inp=document.getElementById('ansInp');
  if(!inp||!inp.value.trim()){if(inp)inp.focus();return;}
  const val=inp.value.trim(), q=questions[qIdx];
  const correct=norm(val)===norm(q.en), prev=answers[qIdx];
  if(correct){ if(!prev||!prev.correct)okN++; answers[qIdx]={input:val,correct:true}; }
  else { if(!prev)errN++; answers[qIdx]={input:val,correct:false}; }
  renderProg(); renderPrac(); renderNav();
}

function renderNav(){
  const row=document.getElementById('navRow');
  if(isDone){row.style.display='none';return;}
  const total=questions.length, ans=answers[qIdx], isOk=!!(ans&&ans.correct);
  row.style.display='flex';
  row.innerHTML=`
    ${qIdx>0?`<button class="nbtn" onclick="goTo(${qIdx-1})">← 上一题</button>`:''}
    ${isOk&&qIdx<total-1?`<button class="nbtn p" onclick="goTo(${qIdx+1})">下一题 →</button>`:''}
    ${isOk&&qIdx===total-1?`<button class="nbtn p" onclick="showFinish()">查看成绩 🎉</button>`:''}`;
}

function goTo(i){ qIdx=i; renderProg(); renderPrac(); renderNav(); }

function showFinish(){
  isDone=true;
  const total=questions.length, pct=Math.round(okN/total*100);
  const emoji=pct>=90?'🏆':pct>=70?'🌟':pct>=50?'💪':'📚';
  const msg=pct>=90?'非常棒！继续保持！':pct>=70?'做得不错！再接再厉！':pct>=50?'加油！多练习会更好！':'不要气馁，多读多练！';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('navRow').style.display='none';
  document.getElementById('progBar').style.width='100%';
  const fa=document.getElementById('finishArea');
  fa.style.display='';
  fa.innerHTML=`<div class="finish">
    <div class="f-emoji">${emoji}</div>
    <div class="f-title">练习完成！</div>
    <div class="f-score">${pct}分</div>
    <div class="f-sub">${msg}</div>
    <div class="stat-row">
      <div class="stat"><div class="sn g">${okN}</div><div class="sl">答对</div></div>
      <div class="stat"><div class="sn r">${errN}</div><div class="sl">答错</div></div>
      <div class="stat"><div class="sn">${total}</div><div class="sl">总题数</div></div>

}

/* =====================================================================
   DICT  —  MyMemory free translation API (CORS-enabled, no key needed)
            + Claude AI fallback for richer definitions
   ===================================================================== */
function dictBtn(text){
  return `<button class="dict-btn" data-dict="${esc(text)}" title="查询词典释义">📖 词典</button>`;
}

document.addEventListener('click', e => {
  const b = e.target.closest('[data-dict]');
  if (b) lookupDict(b.dataset.dict, b);
});

async function lookupDict(text, btn) {
  if (btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  const origText = btn.textContent;
  btn.textContent = '⏳ 查询中…';

  // find the nearest dictPanel
  let panel = null;
  let el = btn;
  for (let i=0; i<10; i++){
    el = el.parentElement;
    if (!el) break;
    panel = el.querySelector('#dictPanel');
    if (panel) break;
  }
  if (!panel) { btn.classList.remove('loading'); btn.textContent=origText; return; }

  panel.innerHTML = '<div class="dict-panel"><span class="dp-extra">查询中，请稍候…</span></div>';

  // Decide: single word/phrase → MyMemory; long sentence → Claude
  const wordCount = text.trim().split(/\s+/).length;
  let html = '';
  if (wordCount <= 5) {
    html = await queryMyMemory(text);
  } else {
    html = await queryClaude(text);
  }

  panel.innerHTML = html;
  btn.classList.remove('loading');
  btn.textContent = origText;
}

async function queryMyMemory(text) {
  // MyMemory: free, CORS-enabled, no API key needed
  // Returns translation + match data including alternatives
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh&de=student@study.com`;
    const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    if (data.responseStatus !== 200) throw new Error(data.responseMessage||'API error');

    const main = data.responseData.translatedText || '';
    const matches = data.matches || [];

    // collect unique translations, filter noise
    const seen = new Set();
    const alts = [];
    for (const m of matches) {
      const t = (m.translation||'').trim();
      if (!t || t===main || seen.has(t)) continue;
      // filter out obviously bad results (same as source, all caps, too long)
      if (t.toLowerCase()===text.toLowerCase()) continue;
      if (t.length > 60) continue;
      seen.add(t);
      alts.push({text:t, quality: m.quality||0, source: m.source||''});
      if (alts.length >= 4) break;
    }

    // Also call Claude for richer part-of-speech breakdown if single word
    let claudeHtml = '';
    const wordCount = text.trim().split(/\s+/).length;
    if (wordCount === 1) {
      claudeHtml = await queryClaude(text, true);
    }

    let html = '<div class="dict-panel">';
    html += '<div class="dp-source">🌐 MyMemory 翻译</div>';
    html += `<div class="dp-item"><span class="dp-tag">主译</span><span class="dp-text">${esc(main)}</span></div>`;
    if (alts.length > 0) {
      html += '<hr class="dp-divider">';
      html += '<div class="dp-extra" style="margin-bottom:4px;font-weight:700;color:#6d28d9">其他释义：</div>';
      for (const a of alts) {
        html += `<div class="dp-item"><span class="dp-tag">释义</span><span class="dp-text">${esc(a.text)}</span></div>`;
      }
    }
    html += '</div>';
    if (claudeHtml) html += claudeHtml;
    return html;
  } catch(e) {
    return await queryClaude(text);
  }
}

async function queryClaude(text, compact=false) {
  // Claude API 不可在浏览器直接调用（CSP限制），改用 Free Dictionary API
  return await queryFreeDictAsPanel(text);
}

/* 用 MyMemory 把英文短语翻译成中文，失败静默返回空 */
async function translateDef(text) {
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`;
    const r = await fetch(url, {signal: AbortSignal.timeout(5000)});
    if (!r.ok) return '';
    const data = await r.json();
    const t = (data.responseData?.translatedText || '').trim();
    if (!t || t.toLowerCase() === text.toLowerCase()) return '';
    return t;
  } catch(e) { return ''; }
}

async function queryFreeDictAsPanel(text) {
  if (/\s/.test(text.trim()) || /[一-鿿]/.test(text)) return '';
  try {
    const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(text.trim())}`;
    const r = await fetch(url, {signal: AbortSignal.timeout(7000)});
    if (!r.ok) return '';
    const data = await r.json();
    if (!Array.isArray(data) || !data[0]) return '';
    const entry = data[0];
    const meanings = entry.meanings || [];
    if (!meanings.length) return '';
    const POS_ZH = {noun:'名词',verb:'动词',adjective:'形容词',adverb:'副词',
                    pronoun:'代词',preposition:'介词',conjunction:'连词',interjection:'感叹词',phrase:'短语'};

    // 收集前3条释义 + 例句
    const items = [];
    for (const m of meanings) {
      if (items.length >= 3) break;
      const defs = m.definitions || [];
      if (!defs.length) continue;
      items.push({ pos: m.partOfSpeech||'', def: defs[0].definition||'', example: defs[0].example||'' });
    }

    // 并行翻译释义和例句
    const zhDefs     = await Promise.all(items.map(it => translateDef(it.def)));
    const zhExamples = await Promise.all(items.map(it => it.example ? translateDef(it.example) : Promise.resolve('')));

    let html = '<div class="dict-panel">';
    html += '<div class="dp-source">📖 英汉词典</div>';
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      html += `<div class="dp-item"><span class="dp-tag">${esc(POS_ZH[it.pos]||it.pos)}</span><div>`;
      // 中文释义优先，英文原文放括号
      if (zhDefs[i]) {
        html += `<div style="font-size:13px;color:var(--txt);line-height:1.5">${esc(zhDefs[i])}</div>`;
        html += `<div style="font-size:11px;color:var(--muted);margin-top:1px">${esc(it.def)}</div>`;
      } else {
        html += `<div style="font-size:13px;color:var(--txt)">${esc(it.def)}</div>`;
      }
      // 例句：中文+英文
      if (it.example) {
        if (zhExamples[i]) {
          html += `<div style="font-size:11px;color:#8b5cf6;margin-top:3px;font-style:italic">例：${esc(zhExamples[i])}</div>`;
          html += `<div style="font-size:11px;color:var(--muted);font-style:italic;opacity:.8">${esc(it.example)}</div>`;
        } else {
          html += `<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:3px">${esc(it.example)}</div>`;
        }
      }
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  } catch(e) { return ''; }
}

/* ═══════════════════════════════════════════════
   CUSTOM TRANSLATOR
   ═══════════════════════════════════════════════ */
let transDir = 'en|zh';
const transHistory = [];

function setDir(d, btn) {
  transDir = d;
  document.querySelectorAll('.tdir').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active'); else if(event && event.target) event.target.classList.add('active');
  const inp = document.getElementById('transInp');
  if (inp) {
    inp.placeholder = d === 'zh|en' ? '输入中文词语或句子…' :
                      d === 'auto'  ? '自动检测语言，输入任意文字…' :
                                      '输入英文单词、词组或句子…';
  }
}

function clearTrans() {
  const inp = document.getElementById('transInp');
  const res = document.getElementById('transResult');
  if (inp) { inp.value=''; inp.focus(); }
  if (res) { res.className='trans-result'; res.innerHTML='<span class="tr-empty">翻译结果将显示在这里</span>'; }
}

function addHistory(text) {
  if (!text || transHistory.includes(text)) return;
  transHistory.unshift(text);
  if (transHistory.length > 8) transHistory.pop();
  renderHistory();
}

function renderHistory() {
  const sec = document.getElementById('histSection');
  const list = document.getElementById('histList');
  if (!sec || !list) return;
  if (transHistory.length === 0) { sec.style.display='none'; return; }
  sec.style.display = '';
  list.innerHTML = transHistory.map(t =>
    `<span class="hist-chip" onclick="useHistory('${esc(t)}')">${esc(t.length>20?t.slice(0,20)+'…':t)}</span>`
  ).join('');
}

function useHistory(text) {
  const inp = document.getElementById('transInp');
  if (inp) { inp.value = text; doTranslate(); }
}

/* ── 核心翻译函数 ── */
async function doTranslate() {
  const inp = document.getElementById('transInp');
  const res = document.getElementById('transResult');
  const btn = document.getElementById('transGoBtn');
  if (!inp || !res) return;
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }

  btn.disabled = true;
  res.className = 'trans-result has-result';
  res.innerHTML = '<div class="tr-loading"><div class="spinner"></div> 正在查询…</div>';
  addHistory(text);

  const isZh = /[\u4e00-\u9fff]/.test(text);
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
  const effectiveDir = transDir === 'auto' ? (isZh ? 'zh|en' : 'en|zh') : transDir;
  const targetIsZh = effectiveDir.split('|')[1] === 'zh';

  let html = '';
  try {
    if (!isZh && wordCount <= 3) {
      // 英文单词/短词组：MyMemory + Free Dictionary（英汉词典）并行
      const [mmRes, fdRes] = await Promise.allSettled([
        myMemoryFetch(text, effectiveDir),
        freeDictFetch(text)
      ]);
      if (mmRes.status==='fulfilled') html += mmRes.value;
      if (fdRes.status==='fulfilled' && fdRes.value) html += fdRes.value;
    } else {
      // 中文输入 或 英文长句：只用 MyMemory
      const mmHtml = await myMemoryFetch(text, effectiveDir);
      html += mmHtml;
    }
  } catch(e) {
    html = `<div class="tr-err">⚠️ 查询失败：${esc(e.message)}</div>`;
  }

  if (!html) html = '<div class="tr-err">⚠️ 无结果，请重试</div>';
  html += actionRow();
  res.innerHTML = html;
  btn.disabled = false;
}

/* ── MyMemory：通用翻译，CORS开放，无需密钥 ── */
async function myMemoryFetch(text, dir) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${dir}`;
  const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
  if (!r.ok) throw new Error('网络错误 '+r.status);
  const data = await r.json();

  // MyMemory 对中文有时返回奇怪结果，做基本校验
  const isZhInput = /[\u4e00-\u9fff]/.test(text);
  let main = (data.responseData?.translatedText || '').trim();

  // 如果结果和原文一样，或者包含奇怪字符，标记为失败
  if (!main || main.toLowerCase() === text.toLowerCase()) {
    throw new Error('翻译结果无效');
  }

  // 对于中文→英文，检查结果是否含中文（说明翻译失败了）
  if (isZhInput && /[\u4e00-\u9fff]/.test(main)) {
    throw new Error('翻译结果无效');
  }

  // 收集备选译法
  const matches = data.matches || [];
  const seen = new Set([main.toLowerCase()]);
  const alts = [];
  for (const m of matches) {
    const t = (m.translation||'').trim();
    if (!t || seen.has(t.toLowerCase())) continue;
    if (t.toLowerCase() === text.toLowerCase()) continue;
    if (t.length > 80) continue;
    // 对中文输入，过滤掉含中文的备选（说明没真正翻译）
    if (isZhInput && /[\u4e00-\u9fff]/.test(t)) continue;
    seen.add(t.toLowerCase());
    alts.push(t);
    if (alts.length >= 4) break;
  }

  let html = '<div style="margin-bottom:10px">';
  html += '<div class="tr-source">🌐 MyMemory 翻译</div>';
  html += `<div class="tr-main">${esc(main)}</div>`;
  if (alts.length > 0) {
    html += '<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px">其他译法：</div>';
    html += '<div class="tr-alts">';
    for (const a of alts) {
      html += `<span class="tr-alt" title="点击填入" onclick="fillAndTranslate('${esc(a)}')">${esc(a)}</span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* ── Free Dictionary API：仅英文单词，提供词性+释义+例句 ── */
async function freeDictFetch(word) {
  if (/\s/.test(word.trim())) return ''; // 多词不查
  const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.trim())}`;
  const r = await fetch(url, {signal: AbortSignal.timeout(7000)});
  if (!r.ok) return ''; // 单词不存在时静默失败
  const data = await r.json();
  if (!Array.isArray(data) || !data[0]) return '';

  const entry = data[0];
  const meanings = entry.meanings || [];
  if (!meanings.length) return '';

  const POS_ZH = {noun:'名词',verb:'动词',adjective:'形容词',adverb:'副词',
                  pronoun:'代词',preposition:'介词',conjunction:'连词',interjection:'感叹词',
                  exclamation:'感叹词',abbreviation:'缩写',phrase:'短语'};

  // 收集前4条释义
  const items = [];
  for (const m of meanings) {
    if (items.length >= 4) break;
    const defs = m.definitions || [];
    if (!defs.length) continue;
    items.push({ pos: m.partOfSpeech||'', def: defs[0].definition||'', example: defs[0].example||'' });
  }

  // 并行翻译所有释义 + 例句
  const zhDefs     = await Promise.all(items.map(it => translateDef(it.def)));
  const zhExamples = await Promise.all(items.map(it => it.example ? translateDef(it.example) : Promise.resolve('')));

  let html = '<div style="margin-bottom:10px">';
  html += '<div class="tr-source">📖 英汉词典</div>';

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const posZh = POS_ZH[it.pos] || it.pos;
    html += `<div class="tr-row"><span class="tr-tag">${esc(posZh||it.pos)}</span><div>`;
    // 中文释义 + 英文原文
    if (zhDefs[i]) {
      html += `<div class="tr-txt">${esc(zhDefs[i])}</div>`;
      html += `<div style="font-size:11px;color:var(--muted);margin-top:1px">${esc(it.def)}</div>`;
    } else {
      html += `<div class="tr-txt">${esc(it.def)}</div>`;
    }
    // 例句：中文 + 英文
    if (it.example) {
      if (zhExamples[i]) {
        html += `<div class="tr-example" style="margin-top:3px;color:#8b5cf6"><i>例：${esc(zhExamples[i])}</i></div>`;
        html += `<div class="tr-example" style="opacity:.7"><i>${esc(it.example)}</i></div>`;
      } else {
        html += `<div class="tr-example" style="margin-top:3px"><i>${esc(it.example)}</i></div>`;
      }
    }
    html += '</div></div>';
  }

  // 近义词
  const syns = [];
  for (const m of meanings) {
    for (const d of (m.definitions||[])) {
      (d.synonyms||[]).forEach(s=>{ if(!syns.includes(s)&&syns.length<5) syns.push(s); });
    }
    (m.synonyms||[]).forEach(s=>{ if(!syns.includes(s)&&syns.length<5) syns.push(s); });
  }
  if (syns.length) {
    html += `<div class="tr-example" style="margin-top:6px"><b>近义词：</b>`;
    html += syns.map(s=>`<span class="tr-alt" onclick="fillAndTranslate('${esc(s)}')">${esc(s)}</span>`).join(' ');
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* ── 操作栏 ── */
function actionRow() {
  return `<hr style="border:none;border-top:1px solid #ddd6fe;margin:10px 0">
  <div class="tr-actions">
    <button class="spk g" onclick="speakTransResult(this)" title="朗读译文"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>朗读译文</button>
    <button class="dict-btn" style="border-color:#0ea5e9;color:#0ea5e9" onclick="copyTransResult()">📋 复制译文</button>
    <button class="dict-btn" style="border-color:#94a3b8;color:#94a3b8" onclick="copyText(document.getElementById('transInp').value)">📄 复制原文</button>
  </div>`;
}

function speakTransResult(btn) {
  const res = document.getElementById('transResult');
  if (!res) return;
  const mainEl = res.querySelector('.tr-main');
  if (!mainEl) return;
  doSpeak(mainEl.textContent.trim(), btn);
}

function copyTransResult() {
  const res = document.getElementById('transResult');
  if (!res) return;
  const mainEl = res.querySelector('.tr-main');
  if (!mainEl) return;
  navigator.clipboard.writeText(mainEl.textContent.trim()).then(() => {
    const t = document.createElement('div');
    t.textContent = '✓ 译文已复制';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:6px 18px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;pointer-events:none';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1500);
  }).catch(()=>{});
}

function fillAndTranslate(word) {
  const inp = document.getElementById('transInp');
  if (inp) { inp.value = word; doTranslate(); }
  document.getElementById('transSection').scrollIntoView({behavior:'smooth',block:'start'});
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>{
    // brief toast
    const t = document.createElement('div');
    t.textContent = '✓ 已复制';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:6px 18px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;pointer-events:none';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1500);
  }).catch(()=>{});
}
